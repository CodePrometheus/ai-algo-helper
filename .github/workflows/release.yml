name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "LD_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "LD_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Run Plugin Verifier
        run: ./gradlew verifyPlugin
        env:
          LD_VERSION: ${{ env.LD_VERSION }}

      - name: Test and publish the plugin
        run: ./gradlew test publishPlugin
        env:
          LD_VERSION: ${{ env.LD_VERSION }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >-
          gh release create "v${LD_VERSION}"
          "build/distributions/ai-algo-helper-${LD_VERSION}.zip"
          --draft
          --title "v${LD_VERSION}"
          --generate-notes

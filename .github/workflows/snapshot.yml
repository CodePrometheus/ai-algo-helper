name: Snapshot

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Test and build the plugin
        run: ./gradlew test buildPlugin
        env:
          LD_VERSION: 0.0

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ai-algo-helper-snapshot
          path: build/distributions/ai-algo-helper-0.0.zip
